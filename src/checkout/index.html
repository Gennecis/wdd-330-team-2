<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="checkout">
        <h2>Review & Place your Order</h2>

        <form name="checkout" class="checkout-form">
          <fieldset class="checkout-name">
            <legend>Customer</legend>
            <label>
              First Name
              <input type="text" name="fname" required />
            </label>
            <label>
              Last Name
              <input type="text" name="lname" required />
            </label>
          </fieldset>

          <fieldset class="checkout-address">
            <legend>Shipping Address</legend>
            <label>
              Street Address
              <input type="text" name="street" required />
            </label>
            <label>
              City
              <input type="text" name="city" required />
            </label>
            <label>
              State
              <input type="text" name="state" required />
            </label>
            <label>
              Zip Code
              <input
                type="text"
                name="zip"
                id="zip"
                required
                pattern="\d{5}"
                maxlength="5"
                inputmode="numeric"
                title="5-digit ZIP code"
              />
            </label>
          </fieldset>

          <fieldset class="checkout-payment">
            <legend>Payment</legend>
            <label>
              Credit Card Number
              <input
                type="text"
                name="cardNumber"
                required
                pattern="\d{16}"
                maxlength="16"
                inputmode="numeric"
                title="16-digit card number, no spaces"
              />
            </label>
            <label>
              Expiration Date
              <input
                type="text"
                name="expiration"
                required
                placeholder="MM/YY"
                title="Expiration date, e.g. 8/27"
              />
            </label>
            <label>
              Security Code
              <input
                type="text"
                name="code"
                required
                pattern="\d{3,4}"
                maxlength="4"
                inputmode="numeric"
                title="3 or 4 digit security code"
              />
            </label>
          </fieldset>

          <div class="order-summary">
            <p>
              Subtotal (<span id="num-items">0</span> items): $<span
                id="subtotal"
                >0.00</span
              >
            </p>
            <p>Tax: $<span id="tax">0.00</span></p>
            <p>Shipping: $<span id="shipping">0.00</span></p>
            <p>Order Total: $<span id="orderTotal">0.00</span></p>
          </div>

          <button type="submit" class="checkout-submit">Checkout</button>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
